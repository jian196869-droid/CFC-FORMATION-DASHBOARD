<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CFC Formation Tracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body{
  font-family:Arial;
  margin:0;
  background:linear-gradient(180deg,#0f172a,#1e293b);
  color:white;
}

header{
  display:flex;
  align-items:center;
  gap:15px;
  padding:15px;
  background:#020617;
}

header img{
  width:60px;
}

.container{
  padding:20px;
}

.card{
  background:#111827;
  border-radius:15px;
  padding:15px;
  margin-bottom:15px;
}

input,select{
  padding:10px;
  border-radius:10px;
  border:none;
  margin:5px;
}

button{
  padding:10px 15px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.btn{
  background:#2563eb;
  color:white;
}

.green{color:#22c55e}
.red{color:#ef4444}
</style>
</head>

<body>

<header>
  <img src="logo-cfc.png.jpg">
  <h2>CFC Formation Tracker</h2>
</header>

<div class="container">

<input type="file" id="upload">

<br>

<input type="text" id="search" placeholder="Search member">

<select id="unit"></select>
<select id="household"></select>

<div id="members"></div>

</div>

<script>

let data = [];

document.getElementById("upload").addEventListener("change", handleFile);

function handleFile(e){
  const file = e.target.files[0];
  const reader = new FileReader();

  reader.onload = function(e){
    const wb = XLSX.read(e.target.result,{type:"binary"});
    const sheet = wb.Sheets[wb.SheetNames[0]];
    data = XLSX.utils.sheet_to_json(sheet);

    process();
  };

  reader.readAsBinaryString(file);
}

function process(){

  data = data.map(row=>{
    const name =
      (row.Lastname || "") + " " + (row.Firstname || "");

    return {
      name: name.trim(),
      unit: row.AreaName || "",
      household: row.NameOfHouseholdHead || "",
      raw: row
    };
  });

  renderFilters();
  render();
}

function renderFilters(){

  const units = [...new Set(data.map(d=>d.unit))];
  const households = [...new Set(data.map(d=>d.household))];

  document.getElementById("unit").innerHTML =
    "<option>All Units</option>" +
    units.map(u=>`<option>${u}</option>`).join("");

  document.getElementById("household").innerHTML =
    "<option>All Household</option>" +
    households.map(h=>`<option>${h}</option>`).join("");
}

document.getElementById("search").oninput = render;
document.getElementById("unit").onchange = render;
document.getElementById("household").onchange = render;

function render(){

  let list = data;

  const search = document.getElementById("search").value.toLowerCase();
  const unit = document.getElementById("unit").value;
  const household = document.getElementById("household").value;

  list = list.filter(d=>{
    return (
      d.name.toLowerCase().includes(search) &&
      (unit==="All Units" || d.unit===unit) &&
      (household==="All Household" || d.household===household)
    );
  });

  document.getElementById("members").innerHTML =
    list.map(d=>`
      <div class="card">
        <h3>${d.name}</h3>
        <p>Unit: ${d.unit}</p>
        <p>Household: ${d.household}</p>
      </div>
    `).join("");
}

</script>

</body>
</html>
